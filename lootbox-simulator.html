<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAULT — Lootbox Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --common:#7a8fa6;--rare:#3b82f6;--epic:#a855f7;--legendary:#f59e0b;--mythic:#ef4444;
    --bg:#080c14;--surface:#0d1420;--surface2:#111827;--border:rgba(255,255,255,0.07);--text:#e2e8f0;--muted:#64748b;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
  body::after{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:400px;background:radial-gradient(ellipse,rgba(168,85,247,0.08) 0%,transparent 70%);pointer-events:none;z-index:0;}

  header{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:1.25rem 2rem;border-bottom:1px solid var(--border);background:rgba(8,12,20,0.9);backdrop-filter:blur(20px);}
  .logo{font-family:'Orbitron',monospace;font-size:1.3rem;font-weight:900;letter-spacing:0.3em;background:linear-gradient(135deg,#e2e8f0 30%,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .header-right{display:flex;align-items:center;gap:1rem;}
  .currency-display{display:flex;align-items:center;gap:0.5rem;background:var(--surface2);border:1px solid var(--border);border-radius:50px;padding:0.5rem 1.25rem;font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:600;}
  .currency-icon{color:#f59e0b;}
  .cps-badge{font-size:0.7rem;color:#4ade80;font-family:'Rajdhani',sans-serif;letter-spacing:0.1em;background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.2);border-radius:50px;padding:0.3rem 0.75rem;}

  .tabs{position:relative;z-index:5;display:flex;border-bottom:1px solid var(--border);background:rgba(8,12,20,0.6);}
  .tab{font-family:'Rajdhani',sans-serif;font-size:0.8rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;padding:1rem 2rem;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all 0.2s;background:none;border-top:none;border-left:none;border-right:none;}
  .tab:hover{color:var(--text);}
  .tab.active{color:var(--text);border-bottom-color:#a855f7;}

  main{position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:2.5rem 2rem;}
  .tab-content{display:none;}
  .tab-content.active{display:block;}

  .section-title{font-family:'Rajdhani',sans-serif;font-size:0.75rem;font-weight:600;letter-spacing:0.25em;text-transform:uppercase;color:var(--muted);margin-bottom:1.25rem;}

  /* BOX GRID */
  .box-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:3rem;}
  .box-card{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem;cursor:pointer;transition:all 0.25s ease;overflow:hidden;}
  .box-card:hover{transform:translateY(-3px);border-color:rgba(255,255,255,0.15);}
  .box-card.selected{border-color:rgba(168,85,247,0.6);background:rgba(168,85,247,0.05);transform:translateY(-3px);}
  .box-icon{font-size:2.5rem;margin-bottom:0.75rem;display:block;}
  .box-name{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:0.25rem;}
  .box-price{font-size:0.8rem;color:#f59e0b;font-weight:500;}
  .box-tier-badge{position:absolute;top:0.75rem;right:0.75rem;font-size:0.65rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:0.2rem 0.5rem;border-radius:4px;}

  /* VAULT LAYOUT */
  .opening-area{display:grid;grid-template-columns:1fr 380px;gap:2rem;align-items:start;}
  .chest-stage{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:3rem 2rem;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:420px;position:relative;overflow:hidden;}
  .chest-stage::before{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:300px;height:100px;background:radial-gradient(ellipse,rgba(168,85,247,0.12) 0%,transparent 70%);}
  .chest-visual{font-size:7rem;cursor:pointer;transition:transform 0.15s ease;position:relative;z-index:1;user-select:none;}
  .chest-visual:hover{transform:scale(1.06);}
  .chest-visual:active{transform:scale(0.96);}
  .chest-visual.opening{animation:chestPulse 0.6s ease forwards;}
  @keyframes chestPulse{0%{transform:scale(1);}30%{transform:scale(1.15) rotate(-5deg);}60%{transform:scale(0.9) rotate(3deg);}100%{transform:scale(1);}}
  .open-btn{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;border:none;border-radius:8px;padding:0.9rem 2.5rem;cursor:pointer;margin-top:1.5rem;transition:all 0.2s ease;position:relative;z-index:1;}
  .open-btn:hover{background:linear-gradient(135deg,#8b5cf6,#c084fc);transform:translateY(-1px);box-shadow:0 8px 25px rgba(139,92,246,0.35);}
  .open-btn:active{transform:translateY(0);}
  .open-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none;}
  .open-btn-cost{font-size:0.75rem;color:rgba(255,255,255,0.5);margin-top:0.6rem;}

  /* INVENTORY */
  .inventory-panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;height:420px;display:flex;flex-direction:column;}
  .inv-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;padding-bottom:0.75rem;border-bottom:1px solid var(--border);}
  .inv-title{font-family:'Rajdhani',sans-serif;font-size:0.8rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);}
  .inv-count{font-size:0.75rem;color:var(--muted);}
  .inv-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0.5rem;overflow-y:auto;flex:1;padding-right:0.25rem;}
  .inv-grid::-webkit-scrollbar{width:3px;}
  .inv-grid::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}
  .inv-item{background:var(--surface2);border-radius:8px;padding:0.5rem;text-align:center;border:1px solid var(--border);transition:all 0.2s ease;overflow:hidden;}
  .inv-item:hover{transform:scale(1.05);}
  .inv-item .item-emoji{font-size:1.3rem;display:block;}
  .inv-item .item-label{font-size:0.55rem;margin-top:0.25rem;line-height:1.2;color:var(--muted);}
  .inv-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:0.5rem;color:var(--muted);font-size:0.8rem;text-align:center;grid-column:1/-1;}
  .inv-empty-icon{font-size:2rem;opacity:0.3;}
  @keyframes itemPop{0%{transform:scale(0);opacity:0;}70%{transform:scale(1.1);}100%{transform:scale(1);opacity:1;}}
  .inv-item.new{animation:itemPop 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;}

  /* ODDS */
  .odds-table{margin-top:2rem;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  .odds-row{display:flex;align-items:center;gap:1rem;padding:0.75rem 1.25rem;border-bottom:1px solid var(--border);}
  .odds-row:last-child{border-bottom:none;}
  .odds-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .odds-label{font-family:'Rajdhani',sans-serif;font-size:0.85rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;flex:1;}
  .odds-bar-wrap{flex:2;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;}
  .odds-bar{height:100%;border-radius:2px;}
  .odds-pct{font-family:'Rajdhani',sans-serif;font-size:0.85rem;font-weight:600;min-width:44px;text-align:right;color:var(--muted);}

  /* STATS */
  .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-top:1.5rem;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem 1.25rem;}
  .stat-label{font-size:0.7rem;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:0.4rem;font-family:'Rajdhani',sans-serif;font-weight:600;}
  .stat-value{font-family:'Orbitron',monospace;font-size:1.3rem;font-weight:700;}

  /* RARITY */
  .r-common{color:var(--common);}.r-rare{color:var(--rare);}.r-epic{color:var(--epic);}.r-legendary{color:var(--legendary);}.r-mythic{color:var(--mythic);}
  .rg-common{background:rgba(122,143,166,0.12);}.rg-rare{background:rgba(59,130,246,0.12);}.rg-epic{background:rgba(168,85,247,0.12);}.rg-legendary{background:rgba(245,158,11,0.12);}.rg-mythic{background:rgba(239,68,68,0.12);}

  /* ======= CLICKER ======= */
  .clicker-layout{display:grid;grid-template-columns:300px 1fr 300px;gap:1.5rem;align-items:start;}

  .click-zone{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem;display:flex;flex-direction:column;align-items:center;gap:1.25rem;}
  .click-zone-title{font-family:'Rajdhani',sans-serif;font-size:0.75rem;font-weight:700;letter-spacing:0.25em;text-transform:uppercase;color:var(--muted);align-self:flex-start;}

  .mine-btn{width:170px;height:170px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#1a2540,#0a0f1c);border:2px solid rgba(245,158,11,0.25);cursor:pointer;position:relative;transition:transform 0.08s ease,border-color 0.2s;display:flex;align-items:center;justify-content:center;font-size:4.2rem;user-select:none;box-shadow:0 0 50px rgba(245,158,11,0.06),inset 0 0 40px rgba(0,0,0,0.5);}
  .mine-btn:hover{border-color:rgba(245,158,11,0.55);box-shadow:0 0 60px rgba(245,158,11,0.15),inset 0 0 40px rgba(0,0,0,0.5);}
  .mine-btn.clicked{transform:scale(0.88);}
  .mine-btn-ring{position:absolute;inset:-10px;border-radius:50%;border:1px solid rgba(245,158,11,0.12);animation:ringPulse 2.5s ease-in-out infinite;}
  .mine-btn-ring2{position:absolute;inset:-20px;border-radius:50%;border:1px solid rgba(245,158,11,0.06);animation:ringPulse 2.5s ease-in-out infinite 0.8s;}
  @keyframes ringPulse{0%,100%{transform:scale(1);opacity:0.4;}50%{transform:scale(1.05);opacity:0.9;}}

  .click-stats{width:100%;display:flex;flex-direction:column;}
  .click-stat-row{display:flex;justify-content:space-between;align-items:center;padding:0.55rem 0;border-bottom:1px solid var(--border);}
  .click-stat-row:last-child{border-bottom:none;}
  .click-stat-label{font-size:0.72rem;color:var(--muted);font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;}
  .click-stat-val{font-family:'Orbitron',monospace;font-size:0.9rem;font-weight:700;color:#f59e0b;}

  .float-coin{position:fixed;pointer-events:none;z-index:500;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1rem;color:#f59e0b;animation:floatUp 0.9s ease-out forwards;}
  @keyframes floatUp{0%{transform:translateY(0) translateX(0);opacity:1;}100%{transform:translateY(-80px) translateX(var(--drift));opacity:0;}}

  /* UPGRADES */
  .upgrades-panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
  .panel-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);font-family:'Rajdhani',sans-serif;font-size:0.75rem;font-weight:700;letter-spacing:0.25em;text-transform:uppercase;color:var(--muted);}
  .upgrades-list{max-height:600px;overflow-y:auto;}
  .upgrades-list::-webkit-scrollbar{width:3px;}
  .upgrades-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px;}

  .upgrade-item{display:flex;align-items:center;gap:1rem;padding:1rem 1.5rem;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s ease;}
  .upgrade-item:last-child{border-bottom:none;}
  .upgrade-item:hover:not(.locked):not(.maxed){background:rgba(255,255,255,0.025);}
  .upgrade-item.locked{opacity:0.4;cursor:not-allowed;}
  .upgrade-item.maxed{opacity:0.55;cursor:not-allowed;}
  .upgrade-icon-box{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;border:1px solid rgba(255,255,255,0.07);}
  .upgrade-info{flex:1;min-width:0;}
  .upgrade-name{font-family:'Rajdhani',sans-serif;font-size:0.88rem;font-weight:700;letter-spacing:0.04em;}
  .upgrade-desc{font-size:0.7rem;color:var(--muted);margin-top:0.15rem;line-height:1.4;}
  .upgrade-cost{font-family:'Orbitron',monospace;font-size:0.75rem;font-weight:700;color:#f59e0b;text-align:right;}
  .upgrade-item.can-afford .upgrade-cost{color:#4ade80;}
  .upgrade-owned-badge{font-size:0.65rem;color:#4ade80;font-family:'Rajdhani',sans-serif;font-weight:700;text-align:right;}

  /* GENERATORS */
  .generators-panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
  .gen-list{padding:1rem;display:flex;flex-direction:column;gap:0.75rem;max-height:600px;overflow-y:auto;}
  .gen-list::-webkit-scrollbar{width:3px;}
  .gen-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px;}

  .gen-item{background:var(--surface2);border-radius:10px;padding:1rem;border:1px solid var(--border);cursor:pointer;transition:all 0.15s ease;position:relative;overflow:hidden;}
  .gen-item:hover:not(.gen-locked){border-color:rgba(255,255,255,0.12);transform:translateX(2px);}
  .gen-item.gen-locked{opacity:0.38;cursor:not-allowed;}
  .gen-header-row{display:flex;align-items:center;gap:0.75rem;margin-bottom:0.6rem;}
  .gen-icon{font-size:1.4rem;}
  .gen-name{font-family:'Rajdhani',sans-serif;font-size:0.88rem;font-weight:700;letter-spacing:0.04em;flex:1;}
  .gen-owned{font-family:'Orbitron',monospace;font-size:1rem;font-weight:700;}
  .gen-progress-wrap{height:3px;background:rgba(255,255,255,0.05);border-radius:2px;margin-bottom:0.5rem;overflow:hidden;}
  .gen-progress{height:100%;border-radius:2px;transition:width 0.05s linear;}
  .gen-footer{display:flex;justify-content:space-between;align-items:center;}
  .gen-cps-label{font-size:0.68rem;color:var(--muted);font-family:'Rajdhani',sans-serif;}
  .gen-cost{font-family:'Rajdhani',sans-serif;font-size:0.8rem;font-weight:700;color:#f59e0b;}
  .gen-item.can-afford .gen-cost{color:#4ade80;}

  /* REVEAL */
  .reveal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s ease;}
  .reveal-overlay.active{opacity:1;pointer-events:all;}
  .reveal-card{background:var(--surface);border-radius:20px;padding:3rem 2.5rem;text-align:center;max-width:420px;width:90%;position:relative;transform:scale(0.7);transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);border:1px solid var(--border);}
  .reveal-overlay.active .reveal-card{transform:scale(1);}
  .reveal-glow{position:absolute;inset:-3px;border-radius:22px;opacity:0;transition:opacity 0.4s ease;pointer-events:none;}
  .reveal-overlay.active .reveal-glow{opacity:1;}
  .reveal-icon{font-size:5rem;margin-bottom:1rem;display:block;animation:floatItem 3s ease-in-out infinite;}
  @keyframes floatItem{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
  .reveal-rarity{font-family:'Rajdhani',sans-serif;font-size:0.75rem;font-weight:700;letter-spacing:0.3em;text-transform:uppercase;margin-bottom:0.5rem;}
  .reveal-name{font-family:'Orbitron',monospace;font-size:1.4rem;font-weight:700;margin-bottom:0.5rem;line-height:1.3;}
  .reveal-desc{font-size:0.85rem;color:var(--muted);line-height:1.6;margin-bottom:1.5rem;}
  .reveal-value{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:600;color:#f59e0b;margin-bottom:1.5rem;}
  .claim-btn{font-family:'Rajdhani',sans-serif;font-size:0.9rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:0.75rem 2rem;cursor:pointer;transition:all 0.2s ease;width:100%;}
  .claim-btn:hover{background:rgba(255,255,255,0.08);}

  .particle{position:fixed;pointer-events:none;z-index:150;border-radius:50%;animation:particleFly var(--dur) ease-out forwards;}
  @keyframes particleFly{0%{transform:translate(0,0) scale(1);opacity:1;}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0;}}
  .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:0.75rem 1.5rem;font-size:0.85rem;color:var(--muted);z-index:200;transition:transform 0.3s ease;white-space:nowrap;}
  .toast.show{transform:translateX(-50%) translateY(0);}

  @media(max-width:1100px){.clicker-layout{grid-template-columns:1fr 1fr;}.generators-panel{grid-column:1/-1;}}
  @media(max-width:900px){.box-grid{grid-template-columns:repeat(2,1fr);}.opening-area{grid-template-columns:1fr;}.stats-bar{grid-template-columns:repeat(2,1fr);}.clicker-layout{grid-template-columns:1fr;}main{padding:1.5rem 1rem;}header{padding:1rem;}}
</style>
</head>
<body>

<header>
  <div class="logo">VAULT</div>
  <div class="header-right">
    <div class="cps-badge" id="cpsBadge" style="display:none">◈ 0 /sec</div>
    <div class="currency-display">
      <span class="currency-icon">◈</span>
      <span id="coins">2500</span>
    </div>
  </div>
</header>

<div class="tabs">
  <button class="tab active" id="tab-btn-vault" onclick="switchTab('vault',this)">🔒 Vault</button>
  <button class="tab" id="tab-btn-mine" onclick="switchTab('mine',this)">⛏️ Coin Mine</button>
</div>

<main>
  <!-- VAULT -->
  <div class="tab-content active" id="tab-vault">
    <p class="section-title">Choose a vault</p>
    <div class="box-grid" id="boxGrid"></div>
    <div class="opening-area">
      <div>
        <div class="chest-stage">
          <div class="chest-visual" id="chestVisual" onclick="openBox()">🔒</div>
          <button class="open-btn" id="openBtn" onclick="openBox()">Open Vault</button>
          <div class="open-btn-cost" id="btnCost">◈ 50 per open</div>
        </div>
        <div class="stats-bar">
          <div class="stat-card"><div class="stat-label">Opened</div><div class="stat-value" id="statOpened">0</div></div>
          <div class="stat-card"><div class="stat-label">Spent</div><div class="stat-value" id="statSpent">0</div></div>
          <div class="stat-card"><div class="stat-label">Best find</div><div class="stat-value r-legendary" id="statBest">—</div></div>
          <div class="stat-card"><div class="stat-label">Legendaries</div><div class="stat-value r-legendary" id="statLeg">0</div></div>
        </div>
        <div class="odds-table" id="oddsTable"></div>
      </div>
      <div class="inventory-panel">
        <div class="inv-header">
          <div class="inv-title">Inventory</div>
          <div class="inv-count" id="invCount">0 items</div>
        </div>
        <div class="inv-grid" id="invGrid">
          <div class="inv-empty" id="emptyMsg"><span class="inv-empty-icon">📦</span><span>Open a vault to begin</span></div>
        </div>
      </div>
    </div>
  </div>

  <!-- MINE -->
  <div class="tab-content" id="tab-mine">
    <div class="clicker-layout">
      <div class="click-zone">
        <div class="click-zone-title">Coin Mine</div>
        <div class="mine-btn" id="mineBtn" onclick="handleClick(event)">
          <div class="mine-btn-ring"></div>
          <div class="mine-btn-ring2"></div>
          ⛏️
        </div>
        <div class="click-stats">
          <div class="click-stat-row"><span class="click-stat-label">Per click</span><span class="click-stat-val" id="perClickDisplay">+1</span></div>
          <div class="click-stat-row"><span class="click-stat-label">Per second</span><span class="click-stat-val" id="perSecDisplay">0</span></div>
          <div class="click-stat-row"><span class="click-stat-label">Total mined</span><span class="click-stat-val" id="totalMinedDisplay">0</span></div>
          <div class="click-stat-row"><span class="click-stat-label">Total clicks</span><span class="click-stat-val" id="totalClicksDisplay">0</span></div>
        </div>
      </div>

      <div class="upgrades-panel">
        <div class="panel-header">Click upgrades</div>
        <div class="upgrades-list" id="upgradesList"></div>
      </div>

      <div class="generators-panel">
        <div class="panel-header">Passive generators</div>
        <div class="gen-list" id="genList"></div>
      </div>
    </div>
  </div>
</main>

<div class="reveal-overlay" id="revealOverlay" onclick="overlayBgClick(event)">
  <div class="reveal-card" id="revealCard">
    <div class="reveal-glow" id="revealGlow"></div>
    <span class="reveal-icon" id="revealIcon">⚔️</span>
    <div class="reveal-rarity" id="revealRarity">Legendary</div>
    <div class="reveal-name" id="revealName">Dragon Blade</div>
    <div class="reveal-desc" id="revealDesc">An ancient weapon.</div>
    <div class="reveal-value" id="revealValue">◈ 450</div>
    <button class="claim-btn" onclick="closeReveal()">Add to Inventory</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ===== SHARED =====
let coins = 2500;
function setCoins(v){
  coins = Math.max(0, Math.floor(v));
  document.getElementById('coins').textContent = coins.toLocaleString();
  updateBtn(); renderUpgrades(); renderGenerators();
}
function addCoins(n){ setCoins(coins + n); }

function switchTab(id, el){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  el.classList.add('active');
}

// ===== VAULT =====
const BOXES=[
  {id:'bronze',name:'Bronze Vault',icon:'📦',cost:50,tier:'Starter',tierColor:'#cd7f32',color:'#cd7f32',odds:{common:65,rare:24,epic:8,legendary:2.5,mythic:0.5}},
  {id:'silver',name:'Silver Vault',icon:'🗃️',cost:150,tier:'Standard',tierColor:'#94a3b8',color:'#94a3b8',odds:{common:50,rare:30,epic:14,legendary:5,mythic:1}},
  {id:'golden',name:'Golden Vault',icon:'🏆',cost:400,tier:'Premium',tierColor:'#f59e0b',color:'#f59e0b',odds:{common:30,rare:30,epic:24,legendary:12,mythic:4}},
  {id:'obsidian',name:'Obsidian Vault',icon:'💎',cost:1000,tier:'Elite',tierColor:'#a855f7',color:'#a855f7',odds:{common:10,rare:20,epic:30,legendary:28,mythic:12}}
];
const ITEMS={
  common:[{name:'Iron Shield',icon:'🛡️',desc:'A basic shield made from iron ore.',value:30},{name:'Wooden Staff',icon:'🪄',desc:'A simple magical conduit.',value:25},{name:'Health Flask',icon:'🧪',desc:'Restores minor health points.',value:20},{name:'Scout Map',icon:'🗺️',desc:'Reveals nearby terrain.',value:35},{name:'Iron Coin',icon:'🪙',desc:'Standard currency.',value:10},{name:'Stone Rune',icon:'🪨',desc:'Faint traces of power.',value:15}],
  rare:[{name:'Crystal Dagger',icon:'🗡️',desc:'A blade that refracts light.',value:120},{name:'Storm Cape',icon:'🧥',desc:'Woven from thunderstorm fibers.',value:140},{name:'Frost Amulet',icon:'❄️',desc:'Slows enemies on contact.',value:160},{name:'Silver Arrow',icon:'🏹',desc:'Blessed by the moon goddess.',value:110},{name:'Echo Tome',icon:'📖',desc:'Spells cast twice.',value:130}],
  epic:[{name:'Void Gauntlets',icon:'🥊',desc:'Phase through solid matter.',value:380},{name:'Starfall Bow',icon:'🌠',desc:'Fires condensed starlight.',value:420},{name:'Shadow Mask',icon:'🎭',desc:'Bends light around the wearer.',value:400},{name:'Phoenix Feather',icon:'🪶',desc:'Resurrects owner once.',value:500},{name:'Time Hourglass',icon:'⏳',desc:'Rewind the last 3 seconds.',value:460}],
  legendary:[{name:'Dragon Blade',icon:'⚔️',desc:'Forged in the heart of an elder dragon.',value:1200},{name:'Crown of Eons',icon:'👑',desc:'Worn by seventeen ancient kings.',value:1500},{name:'Celestial Orb',icon:'🔮',desc:'Contains a fragment of a dying star.',value:1800},{name:'World Serpent Scale',icon:'🐍',desc:'Impenetrable. Warm to the touch.',value:2000}],
  mythic:[{name:'Eternity Shard',icon:'💠',desc:"A splinter of the universe's first moment.",value:5000},{name:'Godslayer',icon:'🌀',desc:'A weapon that has ended divine lives.',value:6000},{name:'Void Heart',icon:'🖤',desc:'The literal heart of nothingness.',value:8000}]
};
const RARITY_ORDER=['common','rare','epic','legendary','mythic'];
const RARITY_LABELS={common:'Common',rare:'Rare',epic:'Epic',legendary:'Legendary',mythic:'Mythic'};
const RARITY_COLORS={common:'#7a8fa6',rare:'#3b82f6',epic:'#a855f7',legendary:'#f59e0b',mythic:'#ef4444'};
const RARITY_CLASSES={common:'r-common',rare:'r-rare',epic:'r-epic',legendary:'r-legendary',mythic:'r-mythic'};

let selectedBox=BOXES[0], inventory=[], isOpening=false;
let vStats={opened:0,spent:0,legendaries:0,best:null};

function renderBoxGrid(){
  document.getElementById('boxGrid').innerHTML=BOXES.map(b=>`
    <div class="box-card" id="card-${b.id}" onclick="selectBox('${b.id}')">
      <span class="box-icon">${b.icon}</span>
      <div class="box-name" style="color:${b.color}">${b.name}</div>
      <div class="box-price">◈ ${b.cost}</div>
      <div class="box-tier-badge" style="background:${b.tierColor}22;color:${b.tierColor}">${b.tier}</div>
    </div>`).join('');
}
function selectBox(id){
  selectedBox=BOXES.find(b=>b.id===id);
  document.querySelectorAll('.box-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('card-'+id).classList.add('selected');
  document.getElementById('chestVisual').textContent=selectedBox.icon;
  document.getElementById('chestVisual').style.filter=`drop-shadow(0 0 20px ${selectedBox.color}55)`;
  document.getElementById('btnCost').textContent=`◈ ${selectedBox.cost} per open`;
  renderOdds(); updateBtn();
}
function renderOdds(){
  document.getElementById('oddsTable').innerHTML='<p class="section-title" style="padding:1rem 1.25rem 0.5rem;margin:0">Drop rates</p>'+
    RARITY_ORDER.map(r=>`<div class="odds-row"><div class="odds-dot" style="background:${RARITY_COLORS[r]}"></div><div class="odds-label ${RARITY_CLASSES[r]}">${RARITY_LABELS[r]}</div><div class="odds-bar-wrap"><div class="odds-bar" style="width:${Math.min(selectedBox.odds[r]*1.5,100)}%;background:${RARITY_COLORS[r]}"></div></div><div class="odds-pct">${selectedBox.odds[r]}%</div></div>`).join('');
}
function updateBtn(){
  const btn=document.getElementById('openBtn'); if(!btn)return;
  btn.disabled=coins<selectedBox.cost||isOpening;
  btn.textContent=coins<selectedBox.cost?'Insufficient Funds':'Open Vault';
}
function rollRarity(){
  const r=Math.random()*100; let c=0;
  for(const rarity of RARITY_ORDER){c+=selectedBox.odds[rarity];if(r<c)return rarity;}
  return 'common';
}
function openBox(){
  if(isOpening||coins<selectedBox.cost)return;
  isOpening=true; updateBtn();
  setCoins(coins-selectedBox.cost);
  vStats.opened++; vStats.spent+=selectedBox.cost; updateVStats();
  const chest=document.getElementById('chestVisual');
  chest.classList.add('opening'); setTimeout(()=>chest.classList.remove('opening'),700);
  const rarity=rollRarity();
  const item=ITEMS[rarity][Math.floor(Math.random()*ITEMS[rarity].length)];
  if(rarity==='legendary'||rarity==='mythic')vStats.legendaries++;
  if(!vStats.best||RARITY_ORDER.indexOf(rarity)>RARITY_ORDER.indexOf(vStats.best))vStats.best=rarity;
  updateVStats();
  setTimeout(()=>showReveal(item,rarity),700);
  setTimeout(()=>{addToInventory(item,rarity);isOpening=false;updateBtn();},1800);
}
function showReveal(item,rarity){
  const color=RARITY_COLORS[rarity];
  document.getElementById('revealIcon').textContent=item.icon;
  document.getElementById('revealRarity').textContent=RARITY_LABELS[rarity];
  document.getElementById('revealRarity').style.color=color;
  document.getElementById('revealName').textContent=item.name;
  document.getElementById('revealName').style.color=color;
  document.getElementById('revealDesc').textContent=item.desc;
  document.getElementById('revealValue').textContent=`◈ ${item.value} value`;
  const glow=document.getElementById('revealGlow');
  glow.style.background=`linear-gradient(135deg,${color}22,${color}44)`;
  glow.style.boxShadow=`0 0 40px ${color}33`;
  document.getElementById('revealCard').style.border=`1px solid ${color}44`;
  document.getElementById('revealOverlay').classList.add('active');
  if(['epic','legendary','mythic'].includes(rarity))spawnParticles(color,rarity==='mythic'?40:rarity==='legendary'?25:15);
}
function closeReveal(){
  document.getElementById('revealOverlay').classList.remove('active');
}
function overlayBgClick(e){
  if(e.target===document.getElementById('revealOverlay'))closeReveal();
}
function addToInventory(item,rarity){
  inventory.unshift({...item,rarity});
  const em=document.getElementById('emptyMsg'); if(em)em.remove();
  const grid=document.getElementById('invGrid');
  const div=document.createElement('div');
  div.className=`inv-item rg-${rarity} new`;
  div.title=item.name;
  div.innerHTML=`<span class="item-emoji">${item.icon}</span><div class="item-label ${RARITY_CLASSES[rarity]}">${item.name}</div>`;
  grid.insertBefore(div,grid.firstChild);
  document.getElementById('invCount').textContent=`${inventory.length} items`;
  setTimeout(()=>div.classList.remove('new'),400);
}
function updateVStats(){
  document.getElementById('statOpened').textContent=vStats.opened;
  document.getElementById('statSpent').textContent=vStats.spent.toLocaleString();
  const el=document.getElementById('statBest');
  if(vStats.best){el.textContent=RARITY_LABELS[vStats.best];el.className=`stat-value ${RARITY_CLASSES[vStats.best]}`;}
  document.getElementById('statLeg').textContent=vStats.legendaries;
}

// ===== CLICKER =====
let clickPower=1, totalMined=0, totalClicks=0;
const UPGRADES=[
  {id:'u1',name:'Sharpened Pick',icon:'⛏️',desc:'Double your click power',cost:50,level:0,maxLevel:1,color:'#f59e0b',bg:'rgba(245,158,11,0.1)',apply(){clickPower*=2;}},
  {id:'u2',name:'Iron Knuckles',icon:'👊',desc:'+5 coins per click',cost:200,level:0,maxLevel:1,color:'#94a3b8',bg:'rgba(148,163,184,0.1)',apply(){clickPower+=5;}},
  {id:'u3',name:'Gold Rush',icon:'✨',desc:'Triple click power',cost:500,level:0,maxLevel:1,color:'#fbbf24',bg:'rgba(251,191,36,0.1)',apply(){clickPower*=3;}},
  {id:'u4',name:'Mithril Drill',icon:'🔩',desc:'+25 coins per click',cost:2000,level:0,maxLevel:1,color:'#60a5fa',bg:'rgba(96,165,250,0.1)',apply(){clickPower+=25;}},
  {id:'u5',name:'Arcane Amplifier',icon:'🔮',desc:'×5 all click power',cost:8000,level:0,maxLevel:1,color:'#a855f7',bg:'rgba(168,85,247,0.1)',apply(){clickPower*=5;}},
  {id:'u6',name:'Dragon Pickaxe',icon:'🐉',desc:'+200 coins per click',cost:25000,level:0,maxLevel:1,color:'#ef4444',bg:'rgba(239,68,68,0.1)',apply(){clickPower+=200;}},
  {id:'u7',name:'Void Extractor',icon:'🕳️',desc:'×10 all click power',cost:100000,level:0,maxLevel:1,color:'#ec4899',bg:'rgba(236,72,153,0.1)',apply(){clickPower*=10;}},
];
const GENERATORS=[
  {id:'g1',name:'Coin Goblin',icon:'👺',baseCps:0.5,baseCost:75,owned:0,progress:0,color:'#22c55e'},
  {id:'g2',name:'Mana Tap',icon:'💧',baseCps:3,baseCost:500,owned:0,progress:0,color:'#3b82f6'},
  {id:'g3',name:'Rune Forge',icon:'🔥',baseCps:12,baseCost:2000,owned:0,progress:0,color:'#f97316'},
  {id:'g4',name:'Crystal Mine',icon:'💎',baseCps:50,baseCost:8000,owned:0,progress:0,color:'#06b6d4'},
  {id:'g5',name:'Ether Reactor',icon:'⚡',baseCps:200,baseCost:30000,owned:0,progress:0,color:'#a855f7'},
  {id:'g6',name:'Void Siphon',icon:'🌀',baseCps:1000,baseCost:120000,owned:0,progress:0,color:'#ef4444'},
];
const genCost=g=>Math.floor(g.baseCost*Math.pow(1.15,g.owned));
const genCps=g=>g.owned*g.baseCps;
const totalCps=()=>GENERATORS.reduce((s,g)=>s+genCps(g),0);

function handleClick(e){
  const earned=clickPower;
  addCoins(earned); totalMined+=earned; totalClicks++;
  updateClickStats();
  const btn=document.getElementById('mineBtn');
  btn.classList.add('clicked'); setTimeout(()=>btn.classList.remove('clicked'),100);
  const drift=(Math.random()-0.5)*60;
  const el=document.createElement('div');
  el.className='float-coin';
  el.textContent='+'+earned.toLocaleString();
  el.style.cssText=`left:${e.clientX-20}px;top:${e.clientY-10}px;--drift:${drift}px`;
  document.body.appendChild(el); setTimeout(()=>el.remove(),900);
}

function updateClickStats(){
  document.getElementById('perClickDisplay').textContent='+'+clickPower.toLocaleString();
  document.getElementById('perSecDisplay').textContent=totalCps().toFixed(1);
  document.getElementById('totalMinedDisplay').textContent=totalMined.toLocaleString();
  document.getElementById('totalClicksDisplay').textContent=totalClicks.toLocaleString();
  const cps=totalCps();
  const badge=document.getElementById('cpsBadge');
  if(cps>0){badge.style.display='';badge.textContent=`◈ ${cps.toFixed(1)} /sec`;}
}

function renderUpgrades(){
  document.getElementById('upgradesList').innerHTML=UPGRADES.map(u=>{
    const bought=u.level>=u.maxLevel;
    const canAfford=!bought&&coins>=u.cost;
    return `<div class="upgrade-item ${bought?'maxed':canAfford?'can-afford':'locked'}" onclick="buyUpgrade('${u.id}')">
      <div class="upgrade-icon-box" style="background:${u.bg}">${u.icon}</div>
      <div class="upgrade-info">
        <div class="upgrade-name" style="color:${u.color}">${u.name}</div>
        <div class="upgrade-desc">${u.desc}</div>
      </div>
      <div>${bought?`<div class="upgrade-owned-badge">✓ Owned</div>`:`<div class="upgrade-cost">◈ ${u.cost.toLocaleString()}</div>`}</div>
    </div>`;
  }).join('');
}

function buyUpgrade(id){
  const u=UPGRADES.find(x=>x.id===id);
  if(!u||u.level>=u.maxLevel||coins<u.cost)return;
  setCoins(coins-u.cost); u.level++; u.apply();
  updateClickStats(); renderUpgrades();
  showToast(`${u.icon} ${u.name} purchased!`);
}

function renderGenerators(){
  const cps=totalCps();
  document.getElementById('genList').innerHTML=GENERATORS.map(g=>{
    const cost=genCost(g), canAfford=coins>=cost;
    const share=cps>0?(genCps(g)/cps*100):0;
    return `<div class="gen-item ${canAfford?'can-afford':''}" onclick="buyGenerator('${g.id}')">
      <div class="gen-header-row">
        <span class="gen-icon">${g.icon}</span>
        <span class="gen-name">${g.name}</span>
        <span class="gen-owned" style="color:${g.color}">${g.owned}</span>
      </div>
      <div class="gen-progress-wrap"><div class="gen-progress" id="gp-${g.id}" style="width:${g.progress.toFixed(1)}%;background:${g.color}"></div></div>
      <div class="gen-footer">
        <span class="gen-cps-label">${genCps(g).toFixed(1)}/sec${g.owned>0?' · '+share.toFixed(0)+'% of total':''}</span>
        <span class="gen-cost">◈ ${cost.toLocaleString()}</span>
      </div>
    </div>`;
  }).join('');
}

function buyGenerator(id){
  const g=GENERATORS.find(x=>x.id===id);
  const cost=genCost(g); if(coins<cost)return;
  setCoins(coins-cost); g.owned++;
  updateClickStats(); renderGenerators();
  showToast(`${g.icon} ${g.name} hired! (×${g.owned})`);
}

// Passive tick every 50ms
let passiveAccum=0;
setInterval(()=>{
  const cps=totalCps(); if(cps===0)return;
  const tick=cps*0.05;
  passiveAccum+=tick;
  if(passiveAccum>=1){
    const earned=Math.floor(passiveAccum);
    addCoins(earned); totalMined+=earned; passiveAccum-=earned;
    updateClickStats();
  }
  // Animate each generator's progress bar
  GENERATORS.forEach(g=>{
    if(g.owned===0)return;
    g.progress+=genCps(g)*0.05/g.baseCps*20;
    if(g.progress>=100)g.progress=0;
    const bar=document.getElementById('gp-'+g.id);
    if(bar)bar.style.width=g.progress.toFixed(1)+'%';
  });
},50);

function spawnParticles(color,count){
  const cx=window.innerWidth/2,cy=window.innerHeight/2;
  for(let i=0;i<count;i++){
    const p=document.createElement('div'); p.className='particle';
    const angle=Math.random()*Math.PI*2,dist=100+Math.random()*300;
    p.style.cssText=`left:${cx}px;top:${cy}px;background:${color};--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;--dur:${0.6+Math.random()*0.8}s;width:${3+Math.random()*6}px;height:${3+Math.random()*6}px;`;
    document.body.appendChild(p); setTimeout(()=>p.remove(),1500);
  }
}
function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000);
}

document.addEventListener('keydown',e=>{
  if(e.code==='Space'&&!e.target.matches('button,input')){
    e.preventDefault();
    if(document.getElementById('tab-vault').classList.contains('active'))openBox();
    else handleClick({clientX:window.innerWidth/2,clientY:window.innerHeight/2});
  }
});

// INIT
renderBoxGrid(); selectBox('bronze');
renderUpgrades(); renderGenerators(); updateClickStats();
</script>
</body>
</html>
